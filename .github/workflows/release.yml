name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: macos-arm64
            artifact: target/dist/ezz-*-macos-arm64.zip
          - os: windows-latest
            platform: windows-x64
            artifact: target/dist/ezz-*-windows-x64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify macOS runner architecture
        if: runner.os == 'macOS'
        shell: bash
        run: test "$(uname -m)" = "arm64"

      - name: Prepare fixed 7-Zip
        run: cargo xtask prepare

      - name: Package desktop application
        run: cargo xtask package

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Install changelog parser
        uses: taiki-e/install-action@parse-changelog

      - name: Parse changelog
        shell: bash
        run: parse-changelog CHANGELOG.md ${GITHUB_REF_NAME#v} > release_note.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: release_note.md
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          generate_release_notes: false
