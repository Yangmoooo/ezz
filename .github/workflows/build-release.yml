name: Build, Test, and Release

on:
  push:
    branches:
      - main
      - v3
    tags:
      - "v[0-9]+.*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: macos-arm64
            artifact: target/dist/ezz-*-macos-arm64.zip
          - os: windows-latest
            platform: windows-x64
            artifact: target/dist/ezz-*-windows-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2

      - name: Verify macOS runner architecture
        if: runner.os == 'macOS'
        shell: bash
        run: test "$(uname -m)" = "arm64"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Prepare fixed 7-Zip
        run: cargo xtask prepare

      - name: Run tests
        run: cargo test --workspace --all-targets --locked

      - name: Run real 7-Zip end-to-end tests
        run: cargo test --lib --locked -- --ignored

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Package desktop application
        run: cargo xtask package

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ezz-${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          pattern: ezz-*
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ezz-*.zip
          generate_release_notes: true
